  - date: '2026-06-03'
    rating: 2
    summary: >-
      Erasmus University Rotterdam has no consolidated public developer portal. Its
      programmatic surface is research/scholarly infrastructure. The RePub OAI-PMH
      feed was verified live, returning valid OAI-PMH 2.0 XML self-identifying as
      "Erasmus University OAIPMH Feed". The Pure research portal resolves but its
      OAI service path returned HTTP 500 on the Identify verb, so it is listed but
      flagged for re-verification. The EUR research data repository is hosted on
      Figshare and accessible via the public Figshare v2 REST API. The official
      eur-nl GitHub org exists (18 repos). No course/timetable/SIS, identity, or
      mobile-backend APIs were found publicly documented. No endpoints were
      fabricated; only confirmed URLs are listed.
