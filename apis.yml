---
aid: erasmus-university-rotterdam
name: Erasmus University Rotterdam
description: >-
  Erasmus University Rotterdam (EUR) is a public research university in Rotterdam,
  the Netherlands, ranked #158 in the QS World University Rankings 2025. EUR does
  not operate a single consolidated public developer portal; its discoverable,
  programmatic surface is concentrated in scholarly and research-data
  infrastructure. RePub, the institutional repository, exposes a confirmed live
  OAI-PMH metadata feed, the EUR research data repository is hosted on Figshare
  (reachable via the Figshare public REST API), and the EUR & Erasmus MC research
  information portal runs on Pure (CRIS) with an OAI-PMH service path. Most
  course, timetable, identity, and administrative interfaces are gated behind
  institutional affiliation rather than openly documented.
